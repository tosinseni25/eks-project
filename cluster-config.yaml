apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: enterprise-cluster
  region: us-east-1
  version: "1.31"
  tags:
    Environment: production
    Project: eks-challenge
    ManagedBy: eksctl

vpc:
  subnets:
    public:
      us-east-1a:
        id: subnet-0e3ebf15a23d13e0f
      us-east-1b:
        id: subnet-0e1ef9e8076a69aa4
      us-east-1c:
        id: subnet-03bb534c132a720bf

iam:
  withOIDC: true

managedNodeGroups:
  - name: standard-workers
    instanceType: t3.medium
    minSize: 2
    desiredCapacity: 2
    maxSize: 6
    availabilityZones: ["us-east-1a", "us-east-1b", "us-east-1c"]
    iam:
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
    labels:
      role: worker
    ssh:
      allow: false

addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest

cloudWatch:
  clusterLogging:
    enableTypes: ["api", "audit", "authenticator"]
